<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LogiTrack</title>
    <meta name="description" content="Acesse o painel de gestão logística da sua transportadora.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <div class="auth-page">
        <div class="auth-card glass">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <div class="logo" style="justify-content:center;font-size:1.8rem;margin-bottom:0.5rem;">
                    <i data-lucide="truck" style="width:32px;height:32px;"></i>
                    <span>Logi<span class="logo-accent">Track</span></span>
                </div>
                <p class="subtitle">Gestão Logística Multi-Tenant</p>
            </div>

            <div id="login-error" class="error-message">
                <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                <span id="login-error-text"></span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" placeholder="Sua senha" required>
                        <button type="button" class="password-toggle" onclick="togglePass()">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary full-width" style="margin-top:0.5rem;justify-content:center;">
                    <i data-lucide="log-in" style="width:18px;height:18px;"></i> Entrar
                </button>
            </form>

            <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
                <p style="text-align:center;font-size:0.8rem;color:var(--text-dim);margin-bottom:1rem;">Contas de demonstração:</p>
                <div style="display:grid;gap:0.5rem;font-size:0.78rem;">
                    <div class="glass" style="padding:0.6rem 0.8rem;cursor:pointer;transition:var(--transition);" onclick="fillDemo('gs1178546@gmail.com','Menino0503')" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor=''">
                        <strong style="color:var(--accent);">Guilherme</strong><br>
                        <span style="color:var(--text-dim);">gs1178546@gmail.com / Menino0503</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    <script>
        // Auto-redirect if logged in
        (function() {
            const user = DB.getCurrentUser();
            if (user) {
                if (user.role === 'programador') window.location.href = 'programador.html';
                else if (user.role === 'admin') window.location.href = 'dashboard.html';
                else if (user.role === 'driver') window.location.href = 'motorista.html';
            }
        })();

        function togglePass() {
            const inp = document.getElementById('login-password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function fillDemo(email, pass) {
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = pass;
        }

        function showError(msg) {
            document.getElementById('login-error-text').textContent = msg;
            document.getElementById('login-error').classList.add('visible');
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('login-error').classList.remove('visible');

            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            if (!email || !password) { showError('Preencha todos os campos.'); return; }

            const user = DB.findUser(email, password);
            if (!user) { showError('E-mail ou senha incorretos.'); return; }

            DB.setCurrentUser({
                id: user.id, name: user.name, email: user.email,
                role: user.role, carrierId: user.carrierId || null
            });

            if (user.role === 'programador') window.location.href = 'programador.html';
            else if (user.role === 'admin') window.location.href = 'dashboard.html';
            else if (user.role === 'driver') window.location.href = 'motorista.html';
        });

        lucide.createIcons();
    </script>
</body>
</html>
